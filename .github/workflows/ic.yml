name: I/C

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    name: Unit tests (no Isabelle)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Python
      run: sudo apt-get update -qq && sudo apt-get install -y -qq python3

    - name: Run unit tests
      run: |
        cd ic
        ./run_tests.sh --unit-only

  integration:
    name: Integration tests (HOL + HOL-Library)
    runs-on: ubuntu-latest
    container:
      image: makarius/isabelle:Isabelle2025-2
      options: --user root
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Isabelle
      uses: ./.github/actions/setup-isabelle-action

    - name: Install Python dependencies
      run: |
        apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv > /dev/null
        pip3 install --break-system-packages prompt_toolkit

    # HOL-Library is needed by test fixtures that import
    # HOL-Library.Datatype_Records (qualified_command, segment_qualified).
    - name: Build HOL + HOL-Library heaps
      run: $ISABELLE build -b HOL HOL-Library

    - name: Run integration tests
      run: |
        cd ic
        ./run_tests.sh --integration-only --isabelle "$ISABELLE"
